name: release

# Builds the zero-setup Windows installer (and a portable zip) and attaches them
# to the GitHub Release. Runs automatically on a version tag; can also be run by
# hand against an existing tag (e.g. v1.4.0) via the "Run workflow" button.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build + attach (e.g. v1.4.0)'
        required: true

permissions:
  contents: write          # upload assets to the release

jobs:
  windows-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install build deps
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller pillow

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Resolve version from the tag
        id: ver
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.tag }}"
          if (-not $tag) { $tag = "${{ github.ref_name }}" }
          $ver = $tag.TrimStart('v')
          "tag=$tag"     | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8
          "version=$ver" | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Build app + installer (runs --selftest internally)
        shell: pwsh
        run: .\build.ps1 -Installer -Version ${{ steps.ver.outputs.version }}

      - name: Package a portable zip
        shell: pwsh
        run: |
          $stage = "dist\portable"
          New-Item -ItemType Directory -Force $stage | Out-Null
          Copy-Item "dist\TSConverter.exe" $stage
          Copy-Item "README.md","LICENSE" $stage -ErrorAction SilentlyContinue
          Compress-Archive -Path "$stage\*" -DestinationPath "dist\TSConverter-${{ steps.ver.outputs.version }}-portable.zip" -Force

      - name: Attach assets to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          fail_on_unmatched_files: true
          files: |
            dist/installer/*.exe
            dist/TSConverter-*-portable.zip
            dist/TSConverter.exe
